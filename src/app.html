<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600&family=Inter:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<style>
			body { background: #000000; margin: 0; }
			#loading {
				position: fixed;
				inset: 0;
				background: #000000;
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 9999;
				transition: opacity 0.3s ease;
			}
			#loading span {
				font-family: Inter, sans-serif;
				font-size: 1.1rem;
				color: rgb(31, 213, 249);
				letter-spacing: 0.05em;
			}
		</style>
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { background: #000000; min-height: 100vh; }
			.app { background: #000000; min-height: 100vh; }
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="loading"><span>semma</span></div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			document.addEventListener('DOMContentLoaded', () => {
				const el = document.getElementById('loading');
				if (el) {
					el.style.opacity = '0';
					setTimeout(() => el.remove(), 300);
				}
			});
		</script>
	</body>
</html>
